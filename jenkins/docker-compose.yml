# Brings up two containers:
#   1. jenkins-docker -> a Docker daemon (Docker-in-Docker) the pipeline builds into
#   2. jenkins        -> the Jenkins server, built from ./jenkins/Dockerfile
#
# This Docker-in-Docker setup is portable: it works the same on Linux,
# macOS, and Windows without fiddling with host socket permissions.
#
# Start it with:   docker compose up -d --build
# Stop it with:    docker compose down
# Reset it with:   docker compose down -v   (deletes Jenkins data too)

services:
  jenkins-docker:
    image: docker:dind
    container_name: jenkins-docker
    privileged: true
    restart: unless-stopped
    networks:
      jenkins:
        aliases:
          - docker
    environment:
      DOCKER_TLS_CERTDIR: /certs
    volumes:
      - jenkins-docker-certs:/certs/client
      - jenkins-data:/var/jenkins_home
    command: --storage-driver=overlay2

  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    container_name: jenkins
    restart: unless-stopped
    networks:
      - jenkins
    environment:
      DOCKER_HOST: tcp://docker:2376
      DOCKER_CERT_PATH: /certs/client
      DOCKER_TLS_VERIFY: "1"
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins-data:/var/jenkins_home
      - jenkins-docker-certs:/certs/client:ro

networks:
  jenkins:

volumes:
  jenkins-data:
  jenkins-docker-certs:
